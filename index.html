<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Please Excuse</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="paper">

        <div class="header">
            PLEASE EXCUSE
        </div>

        <div class="subtitle">
            temporary exemption form
        </div>

        <div class="question">
            what are we done with today?
        </div>

        <input
            type="text"
            id="nameInput"
            placeholder="enter a name if desired"
        >

        <div class="categories">

            <button class="category-button">
                the hustle
            </button>

            <button class="category-button">
                the horrors
            </button>

            <button class="category-button">
                the notifications
            </button>

            <button class="category-button">
                the expectations
            </button>

            <button class="category-button">
                the constant bids for my attention
            </button>

            <button class="category-button">
                the overwhelming sense that something is wrong
            </button>

            <button class="category-button">
                being perceived
            </button>

        </div>

        <div
            id="result"
            class="result hidden"
        ></div>

        <div class="action-buttons hidden">

            <button id="againButton">
                i need another excuse
            </button>

            <button id="saveButton">
                share excuse
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
